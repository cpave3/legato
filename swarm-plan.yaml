        prompt: |
          You're working on the **legato swarm improvements** swarm.
          All implementation is landed in steps 1–2. Your job is to update
          the project's CLAUDE-facing documentation so future agents (and
          future-you) understand the new surface.

          Working directory: /home/cameron/Projects/legato.

          ## What to document

          1. `docs/ai/swarm.md`:
             - Under "Lifecycle" (or a new "Cancellation & recreation"
               section), explain that the user can cancel a swarm from
