version: "3"

tasks:
  build:
    desc: Build the legato binary
    cmds:
      - go build -o legato ./cmd/legato/

  test:
    desc: Run all tests
    cmds:
      - go test ./... -count=1

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test ./... -v -count=1

  test:race:
    desc: Run all tests with race detector
    cmds:
      - go test -race ./... -count=1

  test:cover:
    desc: Run tests with coverage
    cmds:
      - go test ./... -count=1 -coverprofile=coverage.out
      - go tool cover -func=coverage.out | tail -1

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  check:
    desc: Build, test, vet, and lint
    cmds:
      - task: build
      - task: test
      - task: vet
      - task: lint

  run:
    desc: Run the application
    cmds:
      - go run ./cmd/legato

  install:
    desc: Install legato to $GOPATH/bin
    cmds:
      - go install ./cmd/legato/

  web:build:
    desc: Build the frontend
    dir: web
    cmds:
      - pnpm run build

  web:dev:
    desc: Start the frontend dev server
    dir: web
    cmds:
      - pnpm run dev

  web:test:
    desc: Run frontend tests
    dir: web
    cmds:
      - pnpm run test

  install:tools:
    desc: Install development tools
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
