version: "3"

tasks:
  build:
    desc: Build the legato binary (TUI only — no web dashboard)
    cmds:
      - go build -o legato ./cmd/legato/

  build:full:
    desc: Build the frontend and the legato binary (TUI + web dashboard)
    cmds:
      - task: web:build
      - task: build

  test:
    desc: Run all tests
    cmds:
      - go test ./... -count=1

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test ./... -v -count=1

  test:build-contract:
    desc: Verify frontend builds preserve the TUI-only Go build fallback
    cmds:
      - task: web:build
      - test -f internal/server/static/dist/.gitkeep
      - go test ./internal/server/static -count=1

  test:race:
    desc: Run all tests with race detector
    cmds:
      - go test -race ./... -count=1

  test:cover:
    desc: Run tests with coverage
    cmds:
      - go test ./... -count=1 -coverprofile=coverage.out
      - go tool cover -func=coverage.out | tail -1

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  check:
    desc: Build, test, vet, and lint
    cmds:
      - task: build
      - task: test
      - task: vet
      - task: lint

  run:
    desc: Run the application
    cmds:
      - go run ./cmd/legato

  install:
    desc: Install legato to $GOPATH/bin
    cmds:
      - go install ./cmd/legato/

  link:
    desc: Build legato and symlink it into $GOBIN (defaults to $GOPATH/bin)
    cmds:
      - task: build
      - |
        bin_dir="$(go env GOBIN)"
        bin_dir="${bin_dir:-$(go env GOPATH)/bin}"
        mkdir -p "$bin_dir"
        ln -sfn "{{.ROOT_DIR}}/legato" "$bin_dir/legato"

  web:build:
    desc: Build the frontend
    dir: web
    cmds:
      - pnpm run build

  web:dev:
    desc: Start the frontend dev server
    dir: web
    cmds:
      - pnpm run dev

  web:test:
    desc: Run frontend tests
    dir: web
    cmds:
      - pnpm run test

  install:tools:
    desc: Install development tools
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
